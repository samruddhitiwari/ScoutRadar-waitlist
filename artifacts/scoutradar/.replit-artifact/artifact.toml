kind = "web"
previewPath = "/"
title = "ScoutRadar Landing Page"
version = "1.0.0"
id = "artifacts/scoutradar"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22676
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/scoutradar run dev"

[services.env]
PORT = "22676"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/scoutradar", "run", "build"]
publicDir = "artifacts/scoutradar/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
